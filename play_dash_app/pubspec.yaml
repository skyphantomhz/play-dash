name: play_dash_app
description: "Mock dependency manifest for the Play Dash Flutter MVP."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Immutable models and serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # MVP persistence
  shared_preferences: ^2.3.2

  # Common utilities
  collection: ^1.18.0
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.12
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.3


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/