version: '3.8'

services:
  web:
    build: .
    container_name: playdash_web
    restart: unless-stopped
    ports:
      - "8000:8000"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: playdash_tunnel
    restart: unless-stopped
    # Use your specific Cloudflare Tunnel token
    command: tunnel run --token YOUR_CLOUDFLARE_TUNNEL_TOKEN_HERE
    # Use the web container's network so cloudflared can access "http://localhost:8000"
    # just like your local setup, without changing the Cloudflare Zero Trust Dashboard!
    network_mode: "service:web"
    depends_on:
      - web